
services:
 node_app:
   image: docker push adelgohar4/first_dockerrepo:latest
   container_name: second_project
   ports:
   - "3001:3000"
   env_file:
   - ./env 
   depends_on:
   - mongo
 mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
 mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: example
    depends_on:
      - mongo
 redis:
  image: redis
 nginx:
  image: nginx:stable-alpine
  ports:
   - "8080:80"
  volumes:
  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
  depends_on:
  - node_app
  
volumes:
 mongo-db: